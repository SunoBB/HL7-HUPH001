spring:
  datasource:
    url: jdbc:postgresql://hapi-fhir-postgres:5432/hapi
    username: admin
    password: admin
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
        search:
          enabled: false
    hibernate:
      ddl-auto: update

hapi:
  fhir:
    auto_create_placeholder_reference_targets: true
    enforce_referential_integrity_on_write: false
    server_address: http://localhost:8081/fhir
